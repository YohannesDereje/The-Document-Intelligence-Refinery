version: "1.0"
metadata:
  corpus: "Ethiopian_Public_Sector_Banking"
  last_updated: "2023-10-27"

# These thresholds are derived from our research_density.py results
thresholds:
  MIN_DIGITAL_DENSITY: 0.0005
  TABLE_RECT_THRESHOLD: 50

routing_rules:
  - name: "landscape_detection"
    priority: 1 # Check orientation first
    condition: "width > height"
    action: "STRATEGY_B"
    reason: "Landscape orientation detected; high probability of wide-format tables."

  - name: "dense_tables"
    priority: 2 # Specificity: High
    condition: "rects > 50"
    action: "STRATEGY_B"
    reason: "High geometric count (rects) indicates complex tables needing structural parsing."

  - name: "standard_digital"
    priority: 3 # Specificity: Medium
    condition: "char_density > 0.0005"
    action: "STRATEGY_A"
    reason: "Sufficient text layer detected for high-speed CPU extraction."

  - name: "pure_image_scan"
    priority: 4 # Fallback/Catch-all for images
    condition: "char_density == 0.0"
    action: "STRATEGY_C"
    reason: "No searchable text layer; requires VLM/OCR-Vision pipeline."