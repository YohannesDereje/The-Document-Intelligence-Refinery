version: 1
thresholds:
	MIN_DIGITAL_DENSITY: 0.0005
	TABLE_RECT_THRESHOLD: 50

rules:
	- name: pure_image_scan
		description: Route fully image-based pages/documents to OCR-first processing.
		when:
			metric: char_density
			operator: eq
			value: 0.0
		action:
			strategy: C
			origin_type: scanned_image
			pipeline: ocr_vision_first

	- name: dense_tables
		description: High rectangle count indicates heavy table/layout structure.
		when:
			metric: rects
			operator: gt
			value: 50
		action:
			strategy: A
			origin_type: native_digital
			pipeline: table_structure_priority

	- name: standard_digital
		description: Text-layer density above minimum threshold indicates digital-native extractability.
		when:
			metric: char_density
			operator: gt
			value: 0.0005
		action:
			strategy: A
			origin_type: native_digital
			pipeline: text_first

	- name: landscape_detection
		description: Landscape geometry often correlates with hybrid report/table layouts.
		when:
			metric: page_width_gt_height
			operator: eq
			value: true
		action:
			strategy: B
			origin_type: hybrid_landscape
			pipeline: orientation_aware
